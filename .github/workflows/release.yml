name: Release

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type "publish" to confirm manual publish
        required: true
        default: "no"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run checks (lint + typecheck + test:types)
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  publish-adapters:
    name: Publish adapter packages
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build main package (type exports for adapter build)
        run: pnpm run build

      - name: Build adapters
        run: pnpm -r --filter "./packages/adapter-*" run build

      - name: Publish adapters
        run: |
          pushd packages/adapter-assemblyscript
          pnpm publish --access public --no-git-checks --provenance --registry=https://registry.npmjs.org
          popd
        shell: bash

  publish-main:
    name: Publish main package
    runs-on: ubuntu-latest
    needs: publish-adapters
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish package
        run: |
          pnpm publish --access public --no-git-checks --provenance --registry=https://registry.npmjs.org
