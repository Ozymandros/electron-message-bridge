name: Release

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type "publish" to confirm manual publish
        required: true
        default: "no"
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run checks (lint + typecheck + test:types)
        run: pnpm run check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  publish-adapters:
    name: Publish adapter packages
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build main package (type exports for adapter build)
        run: pnpm run build

      - name: Build adapters
        run: pnpm -r --filter "./packages/adapter-*" run build

      - name: Check adapter publish availability
        id: adapter_publish_check
        run: |
          ADAPTER_INFO=$(node -e "const fs=require('node:fs');const path=require('node:path');const pkgPath=path.join(process.cwd(),'packages','adapter-assemblyscript','package.json');const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));process.stdout.write(`${pkg.name}@${pkg.version}`)")
          if npm view "${ADAPTER_INFO}" version >/dev/null 2>&1; then
            echo "adapter_already_published=true" >> "$GITHUB_OUTPUT"
            echo "${ADAPTER_INFO} is already published. Skipping adapter publish."
          else
            echo "adapter_already_published=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish adapters
        if: steps.adapter_publish_check.outputs.adapter_already_published != 'true'
        run: pnpm -r --filter "./packages/adapter-*" publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    name: Publish main package
    runs-on: ubuntu-latest
    needs: publish-adapters
    if: github.event_name == 'release' || github.event.inputs.confirm_publish == 'publish'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify adapter publish availability
        run: |
          node -e "const fs=require('node:fs');const path=require('node:path');const pkgPath=path.join(process.cwd(),'packages','adapter-assemblyscript','package.json');const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));console.log(`${pkg.name}@${pkg.version}`)"
          ADAPTER_VERSION=$(node -e "const fs=require('node:fs');const path=require('node:path');const pkgPath=path.join(process.cwd(),'packages','adapter-assemblyscript','package.json');const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));process.stdout.write(pkg.version)")
          PACKAGE_NAME="@electron-ipc-helper/adapter-assemblyscript@${ADAPTER_VERSION}"
          MAX_ATTEMPTS=10

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            if npm view "${PACKAGE_NAME}" version; then
              exit 0
            fi

            if [ "${attempt}" -eq "${MAX_ATTEMPTS}" ]; then
              echo "Package ${PACKAGE_NAME} was not available in the npm registry after ${MAX_ATTEMPTS} attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Package ${PACKAGE_NAME} is not visible yet. Retrying in ${sleep_seconds}s (attempt ${attempt}/${MAX_ATTEMPTS})..."
            sleep "${sleep_seconds}"
          done
        shell: bash

      - name: Check main package publish availability
        id: main_publish_check
        run: |
          MAIN_INFO=$(node -e "const fs=require('node:fs');const path=require('node:path');const pkgPath=path.join(process.cwd(),'package.json');const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));process.stdout.write(`${pkg.name}@${pkg.version}`)")
          if npm view "${MAIN_INFO}" version >/dev/null 2>&1; then
            echo "main_already_published=true" >> "$GITHUB_OUTPUT"
            echo "${MAIN_INFO} is already published. Skipping main publish."
          else
            echo "main_already_published=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish package
        if: steps.main_publish_check.outputs.main_already_published != 'true'
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
