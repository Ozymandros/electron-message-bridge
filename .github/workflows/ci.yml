name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1 — Static checks (lint + typecheck)
  # Fast-feedback job. Runs in parallel with `test`.
  # ──────────────────────────────────────────────────────
  check:
    name: Check (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks (lint + typecheck + test:types)
        run: pnpm run check

  # ──────────────────────────────────────────────────────
  # Job 2 — Tests
  # Run on the full supported Node matrix.
  # ──────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ──────────────────────────────────────────────────────
  # Job 3 — Build
  # Ensures the library actually compiles to dist/.
  # Runs after both check and test pass.
  # ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify dist artefacts
        # Ensure every expected output file was produced
        run: |
          for f in dist/index.mjs dist/index.cjs dist/index.d.ts \
                   dist/preload.mjs dist/preload.cjs dist/preload.d.ts \
                   dist/integrations.mjs dist/integrations.cjs dist/integrations.d.ts \
                   dist/menus.mjs dist/menus.cjs dist/menus.d.ts \
                   dist/appkit.mjs dist/appkit.cjs dist/appkit.d.ts; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All dist artefacts present."
