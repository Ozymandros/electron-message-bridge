name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # Job 1 — Static checks (lint + typecheck + type tests)
  # Fast-feedback job. Runs in parallel with `test`.
  # ──────────────────────────────────────────────────────
  check:
    name: Check (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run checks (lint + typecheck + test:types)
        run: pnpm run check

  # ──────────────────────────────────────────────────────
  # Job 2 — Tests + Coverage enforcement
  # Run on the full supported Node matrix.
  # Coverage is enforced via Vitest thresholds (80%).
  # ──────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report (Node 20 only)
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # Job 3 — Dependency security audit
  # Fails if any high/critical vulnerabilities are found.
  # ──────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit dependencies
        # --audit-level high fails only on high/critical vulnerabilities
        run: pnpm audit --audit-level high

  # ──────────────────────────────────────────────────────
  # Job 4 — Build + Artifact Verification
  # Ensures the library compiles and all dist files exist.
  # Runs after check and test pass.
  # ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify dist artefacts
        run: |
          MISSING=0
          for f in \
            dist/index.mjs dist/index.cjs dist/index.d.ts \
            dist/preload.mjs dist/preload.cjs dist/preload.d.ts \
            dist/integrations.mjs dist/integrations.cjs dist/integrations.d.ts \
            dist/menus.mjs dist/menus.cjs dist/menus.d.ts \
            dist/appkit.mjs dist/appkit.cjs dist/appkit.d.ts \
            dist/lifecycle.mjs dist/lifecycle.cjs dist/lifecycle.d.ts \
            dist/boundary.mjs dist/boundary.cjs dist/boundary.d.ts \
            dist/plugins.mjs dist/plugins.cjs dist/plugins.d.ts \
            dist/plugins/window-state.mjs dist/plugins/window-state.cjs dist/plugins/window-state.d.ts \
            dist/plugins/diagnostics.mjs dist/plugins/diagnostics.cjs dist/plugins/diagnostics.d.ts \
            dist/plugins/updater.mjs dist/plugins/updater.cjs dist/plugins/updater.d.ts \
            dist/adapters/loader.mjs dist/adapters/loader.cjs dist/adapters/loader.d.ts \
            dist/adapters/assemblyscript.mjs dist/adapters/assemblyscript.cjs dist/adapters/assemblyscript.d.ts; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing dist artefact: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then exit 1; fi
          echo "All dist artefacts present."

      - name: Check dist file sizes (budget gate)
        run: |
          # Ensure no single entry point exceeds 50 KB (uncompressed)
          BUDGET_BYTES=51200
          FAIL=0
          for f in dist/*.mjs dist/plugins/*.mjs; do
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt "$BUDGET_BYTES" ]; then
              echo "::warning::$f exceeds size budget: ${SIZE} bytes (budget: ${BUDGET_BYTES})"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::One or more dist files exceed the size budget. Review bundle output."
            exit 1
          fi
          echo "All dist files within size budget."

  # ──────────────────────────────────────────────────────
  # Job 5 — API Surface Regression Check
  # Runs the api-surface tests to catch breaking changes.
  # ──────────────────────────────────────────────────────
  api-surface:
    name: API Surface Check
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run API surface tests
        run: pnpm vitest run tests/api-surface.test.ts
